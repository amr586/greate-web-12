services:
  - type: web
    name: great-society-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start:server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: great-society-db
    databaseName: greatsociety
    user: greatsociety
    plan: free